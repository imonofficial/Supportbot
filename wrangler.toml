name = "telegram-support-bot"
main = "src/index.ts"
compatibility_date = "2024-12-18"

# D1 Database
[[d1_databases]]
binding = "DB"
database_name = "support-db"
database_id = "your-database-id"   # Replace after creation

# KV Namespace
[[kv_namespaces]]
binding = "KV"
id = "your-kv-namespace-id"       # Replace after creation

# Cron trigger for cleanup (runs every day at 04:00 UTC)
[triggers]
crons = ["0 4 * * *"]

# Worker Secrets (set via `wrangler secret put`)
# BOT_TOKEN, OWNER_ID, WEBHOOK_PATH

[vars]
# Optional public vars (none required)
